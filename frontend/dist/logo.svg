<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#1a5c3a" stroke-width="3"/>
  
  <!-- Wolf head background shape -->
  <ellipse cx="50" cy="55" rx="34" ry="30" fill="#1a5c3a"/>
  
  <!-- Left ear -->
  <polygon points="20,38 28,15 38,38" fill="#1a5c3a"/>
  <polygon points="24,36 29,20 36,36" fill="#f97316"/>
  
  <!-- Right ear -->
  <polygon points="80,38 72,15 62,38" fill="#1a5c3a"/>
  <polygon points="76,36 71,20 64,36" fill="#f97316"/>
  
  <!-- Face orange area -->
  <ellipse cx="50" cy="55" rx="27" ry="24" fill="#f97316"/>
  
  <!-- Camera lens / eye - large circle -->
  <circle cx="50" cy="50" r="16" fill="#1a1a2e" stroke="#1a5c3a" stroke-width="2"/>
  <!-- Lens aperture blades (orange) -->
  <path d="M50,34 Q58,42 50,50 Q42,42 50,34" fill="#f97316" opacity="0.7"/>
  <path d="M66,50 Q58,58 50,50 Q58,42 66,50" fill="#f97316" opacity="0.7"/>
  <path d="M50,66 Q42,58 50,50 Q58,58 50,66" fill="#f97316" opacity="0.7"/>
  <path d="M34,50 Q42,42 50,50 Q42,58 34,50" fill="#f97316" opacity="0.7"/>
  <!-- Lens center -->
  <circle cx="50" cy="50" r="7" fill="#0a0a0f"/>
  <circle cx="50" cy="50" r="3" fill="#1a5c3a"/>
  <!-- Lens highlight -->
  <circle cx="53" cy="47" r="2" fill="white" opacity="0.5"/>
  
  <!-- Constellation dots on eye -->
  <circle cx="40" cy="45" r="1" fill="#f97316"/>
  <circle cx="43" cy="40" r="0.8" fill="#f97316"/>
  <circle cx="47" cy="43" r="0.7" fill="#f97316"/>
  <line x1="40" y1="45" x2="43" y2="40" stroke="#f97316" stroke-width="0.5" opacity="0.8"/>
  <line x1="43" y1="40" x2="47" y2="43" stroke="#f97316" stroke-width="0.5" opacity="0.8"/>
  
  <!-- Nose -->
  <ellipse cx="50" cy="67" rx="5" ry="3" fill="#1a5c3a"/>
  
  <!-- Chin guard / collar geometric -->
  <polygon points="38,72 50,82 62,72 55,78 50,76 45,78" fill="#1a5c3a"/>
  
  <!-- White snout highlight -->
  <ellipse cx="50" cy="67" rx="9" ry="6" fill="white" opacity="0.15"/>
</svg>
